<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Contact | Friendly Zen</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Infant:ital,wght@1,500&family=Zen+Old+Mincho:wght@400;600&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      background: #ffffff;
      color: #111111;
      font-family: "Zen Old Mincho", "Hiragino Mincho ProN", "Yu Mincho", Georgia, serif;
      font-size: 18px;
      line-height: 1.65;
    }

    .page {
      max-width: 820px;
      margin: 0 auto;
      padding: 24px;
    }

    a {
      color: #111111;
      text-decoration: underline;
      text-underline-offset: 3px;
    }

    header {
      border-bottom: 1px solid #111111;
      margin-bottom: 46px;
      padding-bottom: 14px;
    }

    nav {
      font-size: 15px;
      line-height: 1.8;
    }

    nav a {
      margin-right: 18px;
      white-space: nowrap;
    }

    .main-heading {
      margin: 32px 0 8px;
      line-height: 0.95;
      font-weight: normal;
    }

    .friendly {
      font-family: "Cormorant Infant", serif;
      font-style: italic;
      font-weight: 500;
      font-size: clamp(4rem, 13vw, 7.5rem);
      letter-spacing: -0.01em;
    }

    .zen {
      display: block;
      margin-top: 10px;
      font-family: "Zen Old Mincho", "Hiragino Mincho ProN", "Yu Mincho", Georgia, serif;
      font-size: clamp(3rem, 9vw, 5.5rem);
      font-weight: 600;
      letter-spacing: 0.14em;
    }

    .small-line {
      margin: 0 0 56px;
      font-size: 17px;
    }

    section {
      margin: 0 0 48px;
      padding-top: 8px;
      border-top: 1px solid #111111;
    }

    h2 {
      font-size: 24px;
      font-weight: 600;
      margin: 0 0 18px;
    }

    p {
      margin: 0 0 18px;
    }

    form {
      max-width: 620px;
      margin-top: 24px;
    }

    label {
      display: block;
      margin: 0 0 6px;
      font-size: 17px;
    }

    input,
    textarea {
      width: 100%;
      box-sizing: border-box;
      margin: 0 0 20px;
      padding: 10px;
      border: 1px solid #111111;
      background: #ffffff;
      color: #111111;
      font-family: "Zen Old Mincho", "Hiragino Mincho ProN", "Yu Mincho", Georgia, serif;
      font-size: 17px;
      line-height: 1.5;
    }

    textarea {
      min-height: 180px;
      resize: vertical;
    }

    button {
      border: 1px solid #111111;
      background: #ffffff;
      color: #111111;
      padding: 10px 18px;
      font-family: "Zen Old Mincho", "Hiragino Mincho ProN", "Yu Mincho", Georgia, serif;
      font-size: 17px;
      cursor: pointer;
    }

    button:hover {
      background: #111111;
      color: #ffffff;
    }

    #form-status {
      margin-top: 20px;
      margin-bottom: 0;
    }

    footer {
      border-top: 1px solid #111111;
      margin-top: 56px;
      padding-top: 18px;
      font-size: 15px;
    }

    @media (max-width: 600px) {
      body {
        font-size: 17px;
      }

      nav a {
        display: inline-block;
        margin-right: 12px;
      }
    }
  </style>
</head>

<body>
  <div class="page">

    <header>
      <nav>
        <a href="index.html">Home</a>
        <a href="about.html">About Friendly Zen</a>
        <a href="services.html">Services</a>
        <a href="meditation.html">Meditation</a>
        <a href="contact.html"><span style="font-weight: 900;">Contact</span></a>
      </nav>
    </header>

    <main>

      <h1 class="main-heading">
        <span class="friendly">Friendly</span>
        <span class="zen">ZEN</span>
      </h1>

      <p class="small-line">
        <!--- add a comment later --->
      </p>

      <section>
        <h2>Get in touch</h2>

        <p>
          Please use the form below to send a message.
        </p>

        <p id="form-status"></p>

        <form id="contact-form" action="https://formspree.io/f/mzdqjkdr" method="POST">
          <label for="name">Name</label>
          <input type="text" id="name" name="name" required>

          <label for="email">Email</label>
          <input type="email" id="email" name="email" required>

          <label for="message">Message</label>
          <textarea id="message" name="message" required></textarea>

          <input type="hidden" name="_subject" value="New message from Friendly Zen website">

          <button type="submit">Send message</button>
        </form>
      </section>

    </main>

    <footer>
      <p>
        &copy; 2026 Jack Wicks. All rights reserved.<br>
        Free hosting by <a href="https://www.github.io">github.io</a>
      </p>
    </footer>

  </div>

  <script>
    const form = document.getElementById("contact-form");
    const status = document.getElementById("form-status");

    form.addEventListener("submit", async function(event) {
      event.preventDefault();

      const formData = new FormData(form);

      try {
        const response = await fetch(form.action, {
          method: form.method,
          body: formData,
          headers: {
            "Accept": "application/json"
          }
        });

        if (response.ok) {
          status.textContent = "Thank you. Your message has been sent.";
          form.reset();
        } else {
          status.textContent = "Sorry, there was a problem sending your message. Please try again.";
        }
      } catch (error) {
        status.textContent = "Sorry, there was a problem sending your message. Please try again.";
      }
    });
  </script>

</body>
</html>
