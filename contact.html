    <main>

      <h1 class="main-heading">
        <span class="friendly">Friendly</span>
        <span class="zen">ZEN</span>
      </h1>

      <p class="subheading">
        Contact
      </p>

      <figure>
        <img src="Shoitsu_Kokushi_Last_Poem.png" title="Shoitsu Kokushi • Last Poem" 
          style="width: 65%; height: auto; display: block; margin-left: auto; margin-right: auto;">
        <figcaption class="image-credit" style="text-align: center;">
         Shoitsu Kokushi • Last Poem. <br> <i>Zen and the Fine Arts, Shin'ichi Hisamatsu</i>.
        </figcaption>
      </figure>

      <section>
        
        <h2>Get in touch</h2>

        <p>
          Please use the form below to send a message.
        </p>

        <p id="form-status"></p>

        <form id="contact-form" action="https://formspree.io/f/mzdqjkdr" method="POST">
          <label for="name">Name</label>
          <input type="text" id="name" name="name" required>

          <label for="email">Email</label>
          <input type="email" id="email" name="email" required>

          <label for="message">Message</label>
          <textarea id="message" name="message" required></textarea>

          <input type="hidden" name="_subject" value="New message from Friendly Zen website">

          <button type="submit">Send message</button>
        </form>
      </section>

    </main>

  </div>

  <script>
    const form = document.getElementById("contact-form");
    const status = document.getElementById("form-status");

    form.addEventListener("submit", async function(event) {
      event.preventDefault();

      const formData = new FormData(form);

      try {
        const response = await fetch(form.action, {
          method: form.method,
          body: formData,
          headers: {
            "Accept": "application/json"
          }
        });

        if (response.ok) {
          status.textContent = "Thank you. Your message has been sent.";
          form.reset();
        } else {
          status.textContent = "Sorry, there was a problem sending your message. Please try again.";
        }
      } catch (error) {
        status.textContent = "Sorry, there was a problem sending your message. Please try again.";
      }
    });
  </script>
